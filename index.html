<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="wallpaper-area">
            <img src="wallpaper.jpg" alt="wallpaper">
        </div>
        <div class="content-area">
            <p>This is not a real online service! You know you need something <br> like this in your life to help you realize your deepest dreams. <br> Sign up now to get started. <br><br> You <em>know</em> you want to.</p>
            <div class="form-body">
                <h3>Let's do this!</h3>
                <form action="" method="">
                    <fieldset>
                        <label for="firstname">FIRST NAME</label>
                        <input type="text">

                        <label for="lasttname">LAST NAME</label>
                        <input type="text">
                    </fieldset>
                    <fieldset>
                        <label for="email">EMAIL</label>
                        <input type="email">

                        <label for="phone">PHONE NUMBER</label>
                        <input type="number">
                    </fieldset>
                    <fieldset>
                        <label for="password">PASSWORD</label>
                        <input type="password">

                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input type="password">
                    </fieldset>
                    <button>Create Account</button>
                    <p>Aready have an account? <a href="#">Log in</a></p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
